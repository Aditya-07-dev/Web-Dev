<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS color properties</title>
    <style>
        h1 {
            color: orange;
        }

        li {
            font-size: 20px;
            font-weight: 800;
        }

        .col1 {
            color: darkred;
        }

        .col2 {
            color: #800080;
        }

        .col3 {
            color: rgb(30, 125, 221);
        }

        .col4 {
            color: rgba(221, 202, 30, 0.884);
        }

        .col5 {
            color: hsl(177, 87%, 50%);
        }

        .col6 {
            color: hsla(135, 87%, 50%, 0.904);
        }
    </style>
</head>

<body>
    <h1>Let's learn about colors</h1>
    <ol>
        <li class="col1">Color keywords</li>
        <li class="col2">hex color code</li>
        <li class="col3">rgb</li>
        <li class="col4">rgba</li>
        <li class="col5">hsl</li>
        <li class="col6">hsla</li>
    </ol>

</body>

</html>
