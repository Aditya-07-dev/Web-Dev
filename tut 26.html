<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transition Property</title>
    <style>
        .cont{
            background-color:antiquewhite;
            width:50vw;
            height:40vh;
        }
        .box{
            background-color: aquamarine;
            width:5vw;
            height:4vh;
             /* transition-property:transform;
            transition-duration:3s ;
            transition-timing-function:cubic-bezier(0.53, 1.01, 0.57, 0.07);
            transition-delay:1s; */
            transition:transform 3s cubic-bezier(0.53, 1.01, 0.57, 0.07) 1s, background-color 3s cubic-bezier(0.53, 1.01, 0.57, 0.07) 1s;    /* short-hand for the 4 lines above. */
        }
        .trans{
            transform:translateX(10vw) translateY(10vh);
            background-color:rgb(2, 175, 118);        
        }
    </style>
</head>
<body>
    <div class="cont">
        <div class="box trans"></div>
    </div>
</body>
</html>
