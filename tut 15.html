<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shadows & Outlines</title>
    <style>
        .box1 {
            border: 2px solid black;
            border-radius:25px;
            padding: 25px;
            box-shadow:4px -4px 8px 0px blue inset;
        }
        p{
            text-shadow:-2px 2px 5px #d100d1;
            margin:25px;
            outline:2px solid magenta;
            outline-offset:15px;
            border:2px solid rgb(136, 68, 136);
            border-radius:25px;
        }
    </style>
</head>

<body>
    <div class="box1">
        I'm box 1
    </div>
    <p>
        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Explicabo aliquam vero magni reprehenderit quas. Laboriosam veritatis vero nulla fugit minima.
    </p>
</body>

</html>
