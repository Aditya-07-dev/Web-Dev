<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transform</title>
    <style>
        .container{
            width:100vw;
            height:80vh;
            border:3px solid violet;
            display:flex;
            gap:25px;
        }
        .box1{
            height:100px;
            width:100px;
            border:3px solid black;
            background-color:beige;
            transform:rotate(45deg);
            display:flex;
            justify-content:center;
            align-items:center;
            margin:10px;
        }
        .box2{
            height:100px;
            width:100px;
            border:3px solid black;
            background-color:beige;
            transform:rotate(0.25turn);
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .box3{
            height:100px;
            width:100px;
            border:3px solid black;
            background-color:beige;
            transform:rotateX(45deg) rotateY(45deg) rotateZ(45deg);
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .box4{
            height:100px;
            width:100px;
            border:3px solid black;
            background-color:beige;
            transform:scale(0.5);
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .box5{
            height:100px;
            width:100px;
            border:3px solid black;
            background-color:beige;
            transform:scaleX(0.8) scaleY(0.5) scaleZ(2);
            /* transform:scale3d(0.5,0.8,0.6);   -shorthand for scale */
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .box6{
            height:100px;
            width:100px;
            border:3px solid black;
            background-color:beige;
            transform:skewX(15deg) skewY(15deg);   /* -skewZ() ni hota kuchh */
            /* transform:skew(15deg);   -shorthand for skew. */
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .box7{
            height:100px;
            width:100px;
            border:3px solid black;
            background-color:beige;
            transform:translateX(35px) translateY(50%);
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .box8{
            height:100px;
            width:100px;
            border:3px solid black;
            background-color:beige;
            transform:translateX(30px) skewY(15deg) scaleX(0.9);
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .box9{
            height:100px;
            width:100px;
            border:3px solid black;
            background-color:beige;
            transform-origin: 48% 111%;
            transform:rotate(45deg);
            display:flex;
            justify-content:center;
            align-items:center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1">Box1</div>
        <div class="box2">Box2</div>
        <div class="box3">Box3</div>
        <div class="box4">Box4</div>
        <div class="box5">Box5</div>
        <div class="box6">Box6</div>
        <div class="box7">Box7</div>
        <div class="box8">Box8</div>
        <div class="box9">Box9</div>
    </div>
</body>
</html>
