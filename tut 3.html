<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dummy site for forms">
    <title>Forms</title>
</head>

<body>
    <h1>Forms</h1>
    <form action="post">
        <div>
            <label for="naam">Name:</label>
            <input type="text" autofocus id="naam" name="name" placeholder="Enter your name">
        </div>
        <div id="gender">
            <label for="gender">Mark your gender:</label>
            <input type="radio" id="male" name="ling" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="ling" value="female">
            <label for="female">Female</label>
        </div>
        <div>
            <input type="checkbox" id="adult" name="siyana">
            <label for="adult" required>Are you 18+?</label>
        </div>
        <div>
            <label for="feedback">Give feedback</label>
            <textarea name="views" id="feedback" rows="4" cols="40">Write your opinions...</textarea>
        </div>
        <div>
            <label for="qualifications">Choose your degree:</label>
            <select name="degree" id="qualifications">
                <option value="opt1">B.Tech</option>
                <option value="opt2">BSc</option>
                <option value="opt3">BaLLB</option>
                <option value="opt4">B.Pharma</option>
            </select>
        </div>

    </form>

</body>

</html>
