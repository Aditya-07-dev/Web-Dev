<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styling lists</title>
    <style>
        nav ul li {
            list-style:disc;
            list-style-position:inside;
            /* list-style-image: url("minecraft.png"); -this is how you can apply an image in place of a marker */
            /* list-style-type:square inside url("minecraft.png"); -this is how you can apply all three at once */
            list-style-type:"🔥 ";
            background-color:peachpuff;
            border:2px solid tomato;

        }
    </style>
</head>

<body>
    <nav>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>
</body>

</html>
